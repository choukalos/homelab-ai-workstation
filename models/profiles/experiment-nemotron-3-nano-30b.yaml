# experiment-nemotron-3-nano-30b — NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 Experiment
# Hybrid Mamba-2 + Transformer MoE, 30B total / 3.5B active
# Unified reasoning + chat model, supports tool calling

name: experiment-nemotron-3-nano-30b
alias: matrix-coder
backend: vllm
status: planned
experiment: true

model:
  path: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  quantization: BF16 (full precision)
  format: huggingface
  expected_vram: 55-65 GB (60 GB weights + KV cache on 72 GB GPU)
  parameters: 30B total, 3.5B active per token
  context: 262144 (default), up to 1048576

launch:
  container: qwen36
  image: vllm/vllm-openai:latest
  compose: compose/experiments/nemotron-3-nano-30b.yml
  restart: "no"
  port: 8000
  shm_size: 16g
  volumes:
    - /home/chuck/data/models:/data/models
  env:
    HF_HOME: /data/models
    HF_TOKEN: ""
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  args:
    --max-model-len: 262144
    --max-num-seqs: 2
    --max-num-batched-tokens: 8192
    --gpu-memory-utilization: 0.80
    --kv-cache-dtype: fp8
    --enable-prefix-caching: true
    --enable-chunked-prefill: true
    --trust-remote-code: true
    --disable-log-requests: true

health:
  endpoint: http://localhost:8000/v1/models

compatible_modes:
  - experiment

benchmarks:
  MMLU-Pro: 78.3
  AIME25: 89.1
  GPQA: 73.0
  LiveCodeBench-v6: 68.3
  SWE-Bench: 38.8
  Arena-Hard: 72.1

notes:
  - ⚠️ Hybrid Mamba-2/Transformer is EXPERIMENTAL in vLLM (need vLLM >= 0.12.0)
  - Requires custom reasoning parser plugin:
      wget https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16/resolve/main/nano_v3_reasoning_parser.py
    Then add to command: --reasoning-parser-plugin nano_v3_reasoning_parser.py --reasoning-parser nano_v3
  - Reasoning sampling: temperature=1.0, top_p=1.0
  - Tool calling sampling: temperature=0.6, top_p=0.95
  - Thinking can be disabled: enable_thinking=False in chat template
  - 6 attention layers + 23 MoE/Mamba-2 layers, 128 experts (6 active)
  - License: NVIDIA Nemotron Open Model License
  - VRAM is tight at 0.80 utilization — reduce max-model-len if OOM
  - Rollback: model-manager mode rollback
