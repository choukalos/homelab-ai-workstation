# experiment-qwen3-next-80b-nvfp4 — Qwen3-Next-80B-A3B-Thinking NVFP4 Experiment
# 80B total, ~3B active (attention MoE), NVIDIA NVFP4 quantization
# Context: 262K native, up to 1M tokens

name: experiment-qwen3-next-80b-nvfp4
alias: matrix-coder
backend: vllm
status: planned
experiment: true

model:
  path: nvidia/Qwen3-Next-80B-A3B-Thinking-NVFP4
  quantization: NVFP4 (NVIDIA TensorRT Model Optimizer)
  format: huggingface / tensorrt-llm
  expected_vram: 40-55 GB (may not fit on 72 GB with large context)
  parameters: 80B total, ~3B active
  context: 262144 (native), up to 1048576

launch:
  container: qwen36
  image: vllm/vllm-openai:latest
  compose: compose/experiments/qwen3-next-80b-nvfp4.yml
  restart: "no"
  port: 8000
  shm_size: 16g
  volumes:
    - /home/chuck/data/models:/data/models
  env:
    HF_HOME: /data/models
    HF_TOKEN: ""
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  args:
    --max-model-len: 131072
    --max-num-seqs: 2
    --max-num-batched-tokens: 8192
    --gpu-memory-utilization: 0.55
    --kv-cache-dtype: fp8
    --enable-prefix-caching: true
    --enable-chunked-prefill: true
    --trust-remote-code: true

health:
  endpoint: http://localhost:8000/v1/models

compatible_modes:
  - experiment

benchmarks:
  MMLU-Pro: 0.822
  GPQA-Diamond: 0.752
  LiveCodeBench-V6: 0.708
  AIME-2025: 0.862

notes:
  - ⚠️ NVFP4 is NVIDIA's custom format — vLLM may NOT support it
  - Official path: TensorRT-LLM with tensor_parallel_size=4 (requires 4x B200)
  - Fallback: Try Qwen/Qwen3-Next-80B-A3B-Thinking-FP8 instead
  - Fallback: Use --quantization aqlm if weights are AQLM-compatible
  - License: Apache 2.0
  - Rollback: model-manager mode rollback
