# Experiment template — copy and edit before use
# Usage: cp compose.experiment.yml compose.experiment-actual.yml
#        edit model name/args, then: docker compose -f compose.experiment-actual.yml up -d

services:
  qwen36:
    image: vllm/vllm-openai:latest
    container_name: qwen36
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/data/models
      - HF_TOKEN=${HF_TOKEN}
      - HF_XET_HIGH_PERFORMANCE=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/chuck/data/models:/data/models
    # ★ EDIT THESE for your candidate model:
    command: >
      --model MODEL_PATH_HERE
      --served-model-name qwen36-27b
      --host 0.0.0.0
      --port 8000
      --max-model-len 131072
      --max-num-seqs 3
      --max-num-batched-tokens 8192
      --gpu-memory-utilization 0.66
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --enable-auto-tool-choice
      --tool-call-parser qwen3_xml
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
