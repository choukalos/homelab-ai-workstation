# vLLM Qwen3.6-27B — Primary model (daily / qwen-coder / experiment)
# Usage: docker compose -f compose/draft/qwen-coder.yml up -d

services:
  qwen36:
    image: vllm/vllm-openai:latest
    container_name: qwen36
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/data/models
      - HF_TOKEN=${HF_TOKEN}
      - HF_XET_HIGH_PERFORMANCE=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/chuck/data/models:/data/models
      - /home/chuck/homelab/scripts/templates:/templates:ro
    command: >
      --chat-template /templates/qwen3-fixed-chat-template.jinja
      --model Lorbus/Qwen3.6-27b-int4-AutoRound
      --served-model-name qwen36-27b
      --host 0.0.0.0
      --port 8000
      --max-model-len 200000
      --max-num-seqs 3
      --max-num-batched-tokens 8192
      --gpu-memory-utilization 0.66
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --enable-auto-tool-choice
      --tool-call-parser qwen3_xml
      --trust-remote-code
      --reasoning-parser qwen3                                                                                                                                                                                                                  
      --speculative-config '{"method":"mtp","num_speculative_tokens":2}'                                                                                                                                                                        
      --default-chat-template-kwargs '{"preserve_thinking":true}'          
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
