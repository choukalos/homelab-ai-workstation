# vLLM Qwen3.6-27B — Qwen-long variant: max VRAM + INT8 W8A16
# Optimizations: W8A16 INT8 weights, FP8 KV cache, 262K native context
# Differences from qwen-coder: W8A16 instead of INT4, 262K context, higher VRAM
# This replaces Lorbus/Qwen3.6-27b-int4-AutoRound with 88plug/Qwen3.6-27B-W8A16
#
# VRAM Budget (72GB RTX PRO 5000, Blackwell, native FP8):
#   W8A16 weights (27B):            ~27 GB
#   Activations (BF16):              ~6  GB
#   GPU overhead (0.92 util):        ~2  GB
#   Remaining for KV cache:          ~37 GB
#   KV @ 262K context (FP8):        ~2.4 GB per sequence
#   → Fits 12+ sequences at full 262K context!
#
# ⚠️ MTP REMOVED: Qwen3_5ForCausalLM not supported for MTP in current vLLM
#
# ⚠️  Requires vLLM v0.21.0+ for compressed-tensors W8A16 support
#     Do NOT use --quantization flag — vLLM auto-detects compressed-tensors
#     Do NOT use --quantization turboquant (vLLM #41560)

services:
  qwen36-long:
    image: vllm/vllm-openai:v0.21.0-cu129-ubuntu2404
    container_name: qwen36-long
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/data/models
      - HF_TOKEN=${HF_TOKEN}
      - HF_XET_HIGH_PERFORMANCE=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/chuck/data/models:/data/models
    command: >
      --model 88plug/Qwen3.6-27B-W8A16
      --served-model-name qwen36-27b-long
      --host 0.0.0.0
      --port 8000
      --max-model-len 262144
      --max-num-seqs 4
      --max-num-batched-tokens 16384
      --gpu-memory-utilization 0.92
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --reasoning-parser qwen3
      --default-chat-template-kwargs '{"preserve_thinking":true}'
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
