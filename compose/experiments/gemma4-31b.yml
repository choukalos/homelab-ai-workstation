# Experiment: Gemma 4 31B (Q4_K_M quantized)
# Model: google/gemma-4-31b-it (loaded via vLLM with built-in quantization)
# VRAM budget: ~30-40 GB on 72 GB GPU (Q4 weights ~15GB + KV cache)
#
# NOTE: If google/gemma-4-31b-it is too slow or fails to quantize at load time,
# try a pre-quantized variant like:
#   bartowski/gemma-4-31b-it-GGUF (requires vLLM GGUF support)
#   or TheBloke/gemma-4-31b-AWQ

services:
  qwen36:
    image: vllm/vllm-openai:latest
    container_name: qwen36
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/data/models
      - HF_TOKEN=${HF_TOKEN}
      - HF_XET_HIGH_PERFORMANCE=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/chuck/data/models:/data/models
    command: >
      --model google/gemma-4-31b-it
      --served-model-name gemma4-31b
      --host 0.0.0.0
      --port 8000
      --max-model-len 131072
      --max-num-seqs 4
      --max-num-batched-tokens 16384
      --gpu-memory-utilization 0.40
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
