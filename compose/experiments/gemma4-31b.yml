# Experiment: Gemma 4 31B — FP8 quantization
# Model: google/gemma-4-31b-it (loaded via vLLM with --quantization fp8)
# VRAM budget: ~35-45 GB on 72 GB GPU (FP8 weights ~15.5GB + activations + KV cache)
#
# --quantization fp8 tells vLLM to quantize the BF16 weights to FP8 at load time.
# This brings a 31B model from ~62GB (BF16) down to ~15.5GB (FP8).
# Supported on vLLM 0.6+ with CUDA 12.4+.
#
# If this fails, fallback options:
#   - bartowski/gemma-4-31b-it-GGUF (requires vLLM GGUF support)
#   - TheBloke/gemma-4-31b-AWQ (with --quantization awq)

services:
  qwen36:
    image: vllm/vllm-openai:latest
    container_name: qwen36
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/data/models
      - HF_TOKEN=${HF_TOKEN}
      - HF_XET_HIGH_PERFORMANCE=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/chuck/data/models:/data/models
    command: >
      --model google/gemma-4-31b-it
      --served-model-name gemma4-31b
      --host 0.0.0.0
      --port 8000
      --quantization fp8
      --max-model-len 131072
      --max-num-seqs 4
      --max-num-batched-tokens 16384
      --gpu-memory-utilization 0.70
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
