# Experiment: NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
# Model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
#
# Architecture: Hybrid Mamba-2 + Transformer MoE
# - 30B total parameters, 3.5B active per token
# - 23 MoE/Mamba-2 layers + 6 attention layers
# - 128 routed experts + 1 shared expert, 6 activated per token
# - Context: 256K default, up to 1M
# - BF16 weights: ~60 GB on 72 GB GPU
#
# ⚠️ Hybrid Mamba-2/Transformer is EXPERIMENTAL in vLLM.
# You may need vLLM >= 0.12.0 and --trust-remote-code.
# The official vLLM deployment requires a custom reasoning parser plugin:
#   wget https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16/resolve/main/nano_v3_reasoning_parser.py
# Then add: --reasoning-parser-plugin nano_v3_reasoning_parser.py --reasoning-parser nano_v3
#
# Recommended sampling:
#   Reasoning:    temperature=1.0, top_p=1.0
#   Tool calling: temperature=0.6, top_p=0.95
#
# Benchmark highlights: MMLU-Pro 78.3, AIME25 89.1, LiveCodeBench 68.3, SWE-Bench 38.8
# License: NVIDIA Nemotron Open Model License

services:
  qwen36:
    image: vllm/vllm-openai:latest
    container_name: qwen36
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/data/models
      - HF_TOKEN=${HF_TOKEN}
      - HF_XET_HIGH_PERFORMANCE=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/chuck/data/models:/data/models
    command: >
      --model nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
      --served-model-name nemotron-3-nano-30b
      --host 0.0.0.0
      --port 8000
      --max-model-len 262144
      --max-num-seqs 2
      --max-num-batched-tokens 8192
      --gpu-memory-utilization 0.80
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --trust-remote-code
      --disable-log-requests
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
