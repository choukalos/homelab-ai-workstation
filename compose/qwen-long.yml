# vLLM Qwen3.6-27B — Long-context variant (qwen-long mode)
# Optimizations: MTP, 2-seq concurrency, larger batch, tuned chunked prefill
# Differences from qwen-coder: 240K context, 2 seqs, lower gpu-mem, MTP, larger batch
# Usage: docker compose -f compose/draft/qwen-long.yml up -d

services:
  qwen36:
    image: vllm/vllm-openai:latest
    container_name: qwen36
    restart: "no"
    ipc: host
    shm_size: "16gb"
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/data/models
      - HF_TOKEN=${HF_TOKEN}
      - HF_XET_HIGH_PERFORMANCE=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - /home/chuck/data/models:/data/models
      - /home/chuck/homelab/scripts/templates:/templates:ro
    command: >
      --chat-template /templates/qwen3-fixed-chat-template.jinja
      --model Lorbus/Qwen3.6-27b-int4-AutoRound
      --served-model-name qwen36-27b
      --host 0.0.0.0
      --port 8000
      --max-model-len 240000
      --max-num-seqs 2
      --max-num-batched-tokens 8192
      --gpu-memory-utilization 0.50
      --kv-cache-dtype fp8
      --enable-prefix-caching
      --enable-chunked-prefill
      --chunked-prefill-size 16384
      --enable-auto-tool-choice
      --tool-call-parser qwen3_xml
      --reasoning-parser qwen3
      --default-chat-template-kwargs '{"preserve_thinking":true}'
      --trust-remote-code
      --speculative-config '{"n_predict": 1}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
